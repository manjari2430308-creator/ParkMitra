version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: parkmitra-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: parkmitra

  backend:
    build: ./backend
    container_name: parkmitra-backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - python_service
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/parkmitra
      JWT_SECRET: change_this_secret_in_production
      JWT_EXPIRE: 7d
      STRIPE_SECRET_KEY: sk_test_placeholder
      PYTHON_SERVICE_URL: http://python_service:8001
      NODE_ENV: production
    volumes:
      - ./frontend:/app/../frontend

  python_service:
    build: ./python_service
    container_name: parkmitra-python
    restart: always
    ports:
      - "8001:8001"

volumes:
  mongo_data:
